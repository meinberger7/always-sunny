<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Always Sunny Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Always Sunny Explorer</h1>
      <a href="./methods.html">Methods & Caveats</a>
    </header>

    <main class="layout">
      <section class="controls">
        <div class="mode-toggle" role="tablist" aria-label="Data mode">
          <button id="mode-harvested" class="active">Harvested</button>
          <button id="mode-harvestable">Harvestable</button>
        </div>

        <div id="harvestable-controls" class="harvestable-controls hidden" aria-live="polite">
          <label>Buildout size
            <select id="buildout-select">
              <option value="20">20%</option>
              <option value="40">40%</option>
              <option value="60" selected>60%</option>
              <option value="80">80%</option>
            </select>
          </label>
          <label>Transmission assumption
            <select id="transmission-select">
              <option value="local">Local grid</option>
              <option value="regional" selected>Regional grid</option>
              <option value="national">National macrogrid</option>
            </select>
          </label>
        </div>

        <h2 id="headline"></h2>
        <p class="caveat" id="mode-caveat"></p>

        <div class="time-control">
          <button id="play-btn">Play</button>
          <input id="time-slider" type="range" min="0" max="23" value="23" />
          <span id="time-label"></span>
        </div>
      </section>

      <section class="viz">
        <div class="map-panel">
          <svg id="map" viewBox="0 0 960 520" aria-label="Contiguous U.S. map">
            <rect x="0" y="0" width="960" height="520" fill="#f6f8fb"></rect>
            <g id="map-orientation-layer"></g>
            <g id="ba-layer"></g>
          </svg>
          <div id="tooltip" class="tooltip hidden"></div>
        </div>

        <aside class="detail-panel">
          <h3>Selected BA</h3>
          <div id="detail-content">Click a marker to inspect details.</div>
        </aside>
      </section>

      <section class="chart-panel">
        <h3>24-hour trend (national aggregate)</h3>
        <svg id="line-chart" viewBox="0 0 960 220" aria-label="24-hour trend chart"></svg>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
